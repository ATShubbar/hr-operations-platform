name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  DATABASE_URL: postgresql://hr:hr_local_dev@localhost:5432/hr_platform
  STAFF_DATABASE_URL: postgresql://app_staff:app_staff_dev_pw@localhost:5432/hr_platform
  CLIENT_DATABASE_URL: postgresql://app_client:app_client_dev_pw@localhost:5432/hr_platform

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hr
          POSTGRES_PASSWORD: hr_local_dev
          POSTGRES_DB: hr_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hr -d hr_platform"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack (pnpm pinned via packageManager)
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Apply database migrations (includes RLS roles + policies)
        run: pnpm --filter @hr/api db:deploy

      - name: Lint, typecheck, test, build
        run: pnpm turbo run lint typecheck test build
